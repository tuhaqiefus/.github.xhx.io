<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        #video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        header.nav-active {
            background: rgba(192,192,192, 0.7);
            backdrop-filter: blur(1px);
            box-shadow: 0 1px 2px rgba(192,192,192,0.3);
            border-bottom: 1px solid rgba(192,192,192,0.8);
        }

        .logo {
            height: 50px;
            transition: all 0.3s ease;
            z-index: 101;
        }

        .logo img {
            height: 100%;
            width: auto;
            transition: all 0.3s ease;
        }

        header.nav-active .logo img {
            filter: brightness(1.2);
        }

        nav {
            display: flex;
            position: relative;
            z-index: 101;
            margin-left: 100px;
        }

        nav > a {
            color: white;
            text-decoration: none;
            margin-left: 120px;
            font-size: 16px;
            position: relative;
            padding: 10px 0;
            height: 40px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        header.nav-active nav > a {
            color: #fff;
            text-shadow: 0 0 5px rgba(192,192,192,0.5);
        }

        .dropdown-container {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            width: 100vw;
            padding: 2px 0;
            background: rgba(192,192,192, 0.7);
            backdrop-filter: blur(1px);
            display: none;
            z-index: 100;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border-top: 1px solid rgba(192,192,192,0.1);
            border-bottom: 1px solid rgba(192,192,192,0.1);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .dropdown-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-start;
            flex-wrap: wrap;
            padding: 15px 20px;
        }

        .dropdown-btn {
            position: relative;
            width: 180px;
            height: 120px;
            margin: 0 15px 15px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            background-size: cover;
            background-position: center;
        }

        .dropdown-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(192,192,192,0.4);
            z-index: 0;
            transition: all 0.3s;
        }

        .dropdown-btn:hover::before {
            background: rgba(0,0,0,0.2);
        }

        .dropdown-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-text {
            position: relative;
            z-index: 1;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-size: 16px;
            font-weight: bold;
        }

        .hero {
            position: absolute;
            bottom: 10%;
            right: 5px;
            width: calc(100% - 10px);
            height: auto;
            padding-bottom: 5px;
        }

        .info-block {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .info-block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 0;
        }

        .info-block:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .info-block h2, .info-block p {
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

            max-width: 90vw;

            overflow: hidden;

        }

        dialog img {

            justify-content: center;

        }

        dialog button:hover {
            background: red;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.getElementById('video-bg');

            video.play().catch(function(error) {
                console.log('error:', error);
                video.controls = false;
            });

            if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                video.setAttribute('playsinline', '');
                video.setAttribute('muted', '');
            }

            document.querySelectorAll('.info-block').forEach(block => {
                block.addEventListener('click', function(e) {
                    const originalHref = this.getAttribute('href');
                    if (originalHref) {
                        window.location.href = originalHref;
                    }
                });
            });

            const mainHeader = document.getElementById('mainHeader');
            const navItems = document.querySelectorAll('.nav-item');
            const dropdownContainers = document.querySelectorAll('.dropdown-container');

            let headerHideTimeout;
            let currentActiveDropdown = null;
            let dropdownShowTime = 0;
            const minDisplayDuration = 500;

            function showDropdown(dropdownElement) {
                if (currentActiveDropdown && currentActiveDropdown !== dropdownElement) {
                    currentActiveDropdown.style.opacity = '0';
                    currentActiveDropdown.style.visibility = 'hidden';
                    currentActiveDropdown.style.display = 'none';
                }

                const headerHeight = mainHeader.offsetHeight;
                dropdownElement.style.top = `${headerHeight}px`;

                dropdownElement.style.display = 'block';
                setTimeout(() => {
                    dropdownElement.style.opacity = '1';
                    dropdownElement.style.visibility = 'visible';
                }, 10);
                currentActiveDropdown = dropdownElement;
                dropdownShowTime = Date.now();
            }

            function hideAllDropdowns() {
                mainHeader.classList.remove('nav-active');
                if (currentActiveDropdown) {
                    const timeSinceShow = Date.now() - dropdownShowTime;
                    const remainingTime = minDisplayDuration - timeSinceShow;

                    if (remainingTime > 0) {
                        clearTimeout(headerHideTimeout);
                        headerHideTimeout = setTimeout(() => {
                            if (!isMouseOverHeaderAndDropdowns()) {
                                hideAllDropdownsInternal();
                            }
                        }, remainingTime);
                    } else {
                        hideAllDropdownsInternal();
                    }
                }
            }

            function hideAllDropdownsInternal() {
                if (currentActiveDropdown) {
                    currentActiveDropdown.style.opacity = '0';
                    currentActiveDropdown.style.visibility = 'hidden';
                    setTimeout(() => {
                        if (currentActiveDropdown) {
                            currentActiveDropdown.style.display = 'none';
                            currentActiveDropdown = null;
                        }
                    }, 300);
                }
            }

            function isMouseOverHeaderAndDropdowns() {
                if (mainHeader.matches(':hover')) {
                    return true;
                }
                for (let i = 0; i < dropdownContainers.length; i++) {
                    const d = dropdownContainers[i];
                    if (d.matches(':hover') && d.style.display === 'block') {
                        return true;
                    }
                }
                return false;
            }

            navItems.forEach(item => {
                const dropdown = item.querySelector('.dropdown-container');

                item.addEventListener('mouseenter', function() {
                    clearTimeout(headerHideTimeout);
                    mainHeader.classList.add('nav-active');
                    showDropdown(dropdown);
                });
            });

            dropdownContainers.forEach(dropdown => {
                dropdown.addEventListener('mouseenter', function() {
                    clearTimeout(headerHideTimeout);
                    mainHeader.classList.add('nav-active');
                });
            });

            mainHeader.addEventListener('mouseleave', function() {
                headerHideTimeout = setTimeout(() => {
                    if (!isMouseOverHeaderAndDropdowns()) {
                        hideAllDropdowns();
                    }
                }, 100);
            });

            dropdownContainers.forEach(dropdown => {
                dropdown.addEventListener('mouseleave', function() {
                    headerHideTimeout = setTimeout(() => {
                        if (!isMouseOverHeaderAndDropdowns()) {
                            hideAllDropdowns();
                        }
                    }, 100);
                });
            });

            mainHeader.addEventListener('mouseenter', function() {
                clearTimeout(headerHideTimeout);
            });

            const employeeDevelopmentBtn = document.querySelector('.dropdown-btn[data-subpage="employee-development"]');

            if (employeeDevelopmentBtn) {
                employeeDevelopmentBtn.addEventListener('click', function(e) {
                    e.preventDefault();

                    const videoDialog = document.getElementById('videoDialog');
                    const popupVideo = document.getElementById('popupVideo');

                    popupVideo.src = 'assets/videos/photo_flow.mp4';
                    videoDialog.showModal();

                    popupVideo.load();
                    popupVideo.play().catch(error => {
                        console.error("视频播放错误:", error);
                        window.location.href = 'html5.html';
                    });

                    popupVideo.onended = function() {
                        videoDialog.close();
                        window.location.href = 'html5.html';
                    };
                });
            }
        });
    </script>

    <title>中国地图 - 自定义布局</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        #china-container {
            position: relative;
            width: 1200px;
            height: 1000px;
            margin: 0 auto;
            background-color: #f0f9ff;
            border: 50px solid #ccc;
            overflow: hidden;
        }

        .province {
            position: absolute;
            cursor: default;
            transition: transform 0.2s, z-index 0.2s;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .province:hover {
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .province img {
            display: block;
            max-width: 100%;
            max-height: 100%;
            height: auto;
            object-fit: contain;
        }

        .info-window {
            position: absolute;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            padding: 15px;
            width: 300px;
            display: none;
            z-index: 100;
            pointer-events: none;
        }

        .info-window h3 {
            margin-top: 0;
            color: #1890ff;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .info-window p {
            margin: 8px 0;
            color: #666;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>

        const container = document.getElementById('china-container');
        const infoWindow = document.getElementById('info-window');

        document.querySelectorAll('.province').forEach(province => {
            const name = province.dataset.name;
            const data = provinceData[name];

            province.addEventListener('mouseenter', (e) => {
                let html = `<h3>${name}</h3>`;
                html += `<p>${data.description}</p>`;
                html += `<p>当前尺寸：<span class="highlight">${province.offsetWidth}px</span> x <span class="highlight">${province.offsetHeight}px</span></p>`;

                infoWindow.innerHTML = html;
                infoWindow.style.display = 'block';

                const offset = 15;
                const windowWidth = infoWindow.offsetWidth;
                const windowHeight = infoWindow.offsetHeight;
                const containerRect = container.getBoundingClientRect();

                let left = e.clientX - containerRect.left + offset;
                let top = e.clientY - containerRect.top + offset;

                if (left + windowWidth > container.offsetWidth) {
                    left = e.clientX - containerRect.left - windowWidth - offset;
                }

                if (top + windowHeight > container.offsetHeight) {
                    top = e.clientY - containerRect.top - windowHeight - offset;
                }

                infoWindow.style.left = left + 'px';
                infoWindow.style.top = top + 'px';
            });

            province.addEventListener('mousemove', (e) => {
                const offset = 15;
                const windowWidth = infoWindow.offsetWidth;
                const windowHeight = infoWindow.offsetHeight;
                const containerRect = container.getBoundingClientRect();

                let left = e.clientX - containerRect.left + offset;
                let top = e.clientY - containerRect.top + offset;

                if (left + windowWidth > container.offsetWidth) {
                    left = e.clientX - containerRect.left - windowWidth - offset;
                }

                if (top + windowHeight > container.offsetHeight) {
                    top = e.clientY - containerRect.top - windowHeight - offset;
                }

                infoWindow.style.left = left + 'px';
                infoWindow.style.top = top + 'px';
            });

            province.addEventListener('mouseleave', () => {
                infoWindow.style.display = 'none';
            });
        });

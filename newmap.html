        const container = document.getElementById('china-container');
        const infoWindow = document.getElementById('info-window');

        document.querySelectorAll('.province').forEach(province => {
            const name = province.dataset.name;
            const data = provinceData[name];

            province.addEventListener('mouseenter', (e) => {
                let html = `<h3>${name}</h3>`;
                html += `<p>${data.description}</p>`;

                infoWindow.innerHTML = html;
                infoWindow.style.display = 'block';

                const offset = 15;
                const windowWidth = infoWindow.offsetWidth;
                const windowHeight = infoWindow.offsetHeight;
                const containerRect = container.getBoundingClientRect();

                let left = e.clientX - containerRect.left + offset;
                let top = e.clientY - containerRect.top + offset;

                if (left + windowWidth > container.offsetWidth) {
                    left = e.clientX - containerRect.left - windowWidth - offset;
                }

                if (top + windowHeight > container.offsetHeight) {
                    top = e.clientY - containerRect.top - windowHeight - offset;
                }

                infoWindow.style.left = left + 'px';
                infoWindow.style.top = top + 'px';
            });

            province.addEventListener('mousemove', (e) => {
                const offset = 15;
                const windowWidth = infoWindow.offsetWidth;
                const windowHeight = infoWindow.offsetHeight;
                const containerRect = container.getBoundingClientRect();

                let left = e.clientX - containerRect.left + offset;
                let top = e.clientY - containerRect.top + offset;

                if (left + windowWidth > container.offsetWidth) {
                    left = e.clientX - containerRect.left - windowWidth - offset;
                }

                if (top + windowHeight > container.offsetHeight) {
                    top = e.clientY - containerRect.top - windowHeight - offset;
                }

                infoWindow.style.left = left + 'px';
                infoWindow.style.top = top + 'px';
            });

            province.addEventListener('mouseleave', () => {
                infoWindow.style.display = 'none';
            });
        });

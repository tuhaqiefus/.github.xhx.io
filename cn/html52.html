<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XINOVA页眉和页脚</title>
    <style>
        /* 全局重置与基础样式，确保页眉和页脚正确渲染 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f4f4f4;
            overflow-x: hidden;
            min-height: 100vh; /* 确保body至少占满整个视口高度，以便页脚始终在底部 */
            display: flex; /* 使用 Flexbox 布局 */
            flex-direction: column; /* 使子元素垂直堆叠 */
        }

        /* 头部 (Header) 样式 */
        header#mainHeader {
            position: fixed; /* 固定定位，使其在滚动时保持在顶部 */
            top: 0; /* 距离顶部0 */
            left: 0; /* 距离左边0 */
            right: 0; /* 距离右边0 */
            width: 100%; /* 宽度100% */
            padding: 20px; /* 内边距 */
            display: flex; /* Flexbox 布局 */
            align-items: center; /* 垂直居中对齐子项 */
            z-index: 1000; /* Z轴层级，确保在其他内容之上 */
            transition: all 0.3s ease; /* 所有属性的过渡效果 */
            justify-content: space-between; /* 子项两端对齐 */
            background: #f7f0f0; /* 初始背景为透明 */
            box-shadow: none; /* 初始无阴影 */
            color: #fffdfd; /* 初始文本颜色 */
        }

        header#mainHeader.nav-active {
            background: rgba(192, 192, 192, 0.7); /* 激活时背景变为半透明灰色 */
            backdrop-filter: blur(1px); /* 背景模糊效果 */
            box-shadow: 0 1px 2px rgba(192, 192, 192, 0.3); /* 阴影效果 */
            border-bottom: 1px solid rgba(192, 192, 192, 0.8); /* 底部边框 */
            color: #ffffff; /* 激活时文本颜色变为白色 */
        }

        header#mainHeader .logo {
            height: 50px; /* Logo 高度 */
            transition: all 0.3s ease; /* 过渡效果 */
            z-index: 1001; /* Z轴层级 */
            margin-left: 450px; /* 左外边距 */
        }

        header#mainHeader .logo img {
            height: 100%; /* 图片高度填充父容器 */
            width: auto; /* 宽度自适应 */
            transition: all 0.3s ease; /* 过渡效果 */
        }

        header#mainHeader.nav-active .logo img {
            filter: brightness(1.2); /* 激活时图片亮度增加 */
        }

        header#mainHeader nav {
            display: flex; /* Flexbox 布局 */
            position: relative; /* 相对定位 */
            z-index: 1001; /* Z轴层级 */
            margin-right: 500px; /* 右外边距 */
        }

        header#mainHeader nav > a {
            color: rgb(5, 3, 3); /* 链接文本颜色 */
            text-decoration: none; /* 去除下划线 */
            margin-left: 50px; /* 左外边距 */
            font-size: 16px; /* 字体大小 */
            position: relative; /* 相对定位 */
            padding: 10px 0; /* 内边距 */
            height: 30px; /* 高度 */
            display: flex; /* Flexbox 布局 */
            align-items: center; /* 垂直居中对齐子项 */
            transition: all 0.3s ease; /* 过渡效果 */
            white-space: nowrap; /* 不换行 */
        }

        header#mainHeader.nav-active nav > a {
            color: #ffffff; /* 激活时链接文本颜色变为白色 */
            text-shadow: 0 0 5px rgba(192, 192, 192, 0.5); /* 文本阴影 */
        }

        .dropdown-container {
            position: fixed; /* 固定定位 */
            top: 70px; /* 距离顶部70px */
            left: 0; /* 距离左边0 */
            right: 0; /* 距离右边0 */
            width: 100vw; /* 宽度占满视口 */
            padding: 2px 0; /* 内边距 */
            background: rgba(192, 192, 192, 0.7); /* 背景为半透明灰色 */
            backdrop-filter: blur(1px); /* 背景模糊效果 */
            display: none; /* 默认隐藏 */
            z-index: 999; /* Z轴层级 */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); /* 阴影效果 */
            border-top: 1px solid rgba(192, 192, 192, 0.1); /* 顶部边框 */
            border-bottom: 1px solid rgba(192, 192, 192, 0.1); /* 底部边框 */
            opacity: 0; /* 初始透明度为0 */
            visibility: hidden; /* 初始不可见 */
            transition: opacity 0.3s ease, visibility 0.3s ease; /* 透明度和可见性过渡效果 */
        }

        .nav-item:hover .dropdown-container {
            display: flex; /* 鼠标悬停时显示 */
            opacity: 1; /* 透明度变为1 */
            visibility: visible; /* 可见 */
        }

        .dropdown-content {
            max-width: 1600px; /* 最大宽度 */
            margin: 0 auto; /* 水平居中 */
            display: flex; /* Flexbox 布局 */
            flex-direction: row; /* 子项水平排列 */
            justify-content: flex-end; /* 子项右对齐 */
            flex-wrap: wrap; /* 允许换行 */
            padding: 15px 20px; /* 内边距 */
            gap: 15px; /* 子项间距 */
        }

        .dropdown-btn {
            /* 相对定位 */
            position: relative;
            /* 宽度 180px 高度120 */
            width: 120px;
            /* 120px，80 */
            height: 80px;
            /* 右外边距 5px，底部外边距 5px */
            margin: 0 5px 5px 0;
            /* 边框圆角 4px */
            border-radius: 4px;
            /* 鼠标指针变为手型 */
            cursor: pointer;
            /* 所有属性的过渡效果 */
            transition: all 0.3s;
            /* 隐藏超出容器的内容 */
            overflow: hidden;
            /* 确保没有边框 */
            border: none;
            /* 使用 Flexbox 布局 */
            display: flex;
            /* 垂直和水平方向都居中对齐子项 */
            justify-content: center;
            align-items: center;
            /* 内边距 15px */
            padding: 15px;
            /* 背景图片覆盖整个容器 */
            background-size: cover;
            /* 背景图片居中 */
            background-position: center;
            /* 新增：与下拉弹窗背景色一致 */
            /* *************背景颜色为带有 0.7 透明度的银色（浅灰色），和 .dropdown-container 一致 ************/

            background-color: rgba(192, 192, 192, 0); /* 按钮背景色为透明 */

        }

        .dropdown-btn::before {
            content: ''; /* 伪元素内容为空 */
            position: absolute; /* 绝对定位 */
            top: 0; left: 0; right: 0; bottom: 0; /* 铺满整个父容器 */
            background: rgba(0, 0, 0, 0); /* 黑色半透明遮罩 */
            z-index: 0; /* Z轴层级，在文本之下 */
            transition: all 0.3s; /* 过渡效果 */
        }

        .dropdown-btn:hover::before {
            background: rgba(0, 0, 0, 0.2); /* 鼠标悬停时遮罩颜色变浅 */
        }

        .dropdown-btn:hover {
            transform: translateY(-5px); /* 鼠标悬停时上移5px */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); /* 阴影效果 */
        }

        /* Text inside dropdown buttons - 下拉按钮内部文本 */
        .btn-text {
            /* 相对定位 */
            position: relative;
            /* z-index 为 1，确保文本位于叠加层之上 */
            z-index: 1;
            /* 文本颜色为白色 */
            color: white;
            /* 文本阴影效果 */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            /* 字体大小 20px *************/
            font-size: 18px;
            /* 字体加粗 */
            font-weight: bold;
        }

        /* 移除语言菜单的特殊样式，使其与其他菜单保持一致 */

        /* 占位内容区域，用于保持页脚在底部，并模拟原页面的头部间距 */
        .placeholder-content {
            min-height: calc(100vh - 90px); /* 最小高度，减去头部高度 */
            margin-top: 90px; /* 模拟原页面头部下方内容的位置 */
            flex-grow: 1; /* 填充可用空间 */
            background-color: #f4f4f4; /* 保持与原页面背景色一致 */
        }

        /* 页脚 (Footer) 样式 */
        footer#mainFooter {
            background-color: #333; /* 背景颜色 */
            color: #fff; /* 文本颜色 */
            padding: 20px 50px; /* 内边距 */
            text-align: center; /* 文本居中 */
            font-size: 0.9em; /* 字体大小 */
            line-height: 1.6; /* 行高 */
            flex-shrink: 0; /* 不缩小 */
        }

        footer#mainFooter p {
            margin: 5px 0; /* 段落外边距 */
        }

        /* 移动端响应式调整 */
        @media (max-width: 768px) {
            header#mainHeader {
                flex-direction: column; /* 垂直排列子项 */
                padding: 10px; /* 内边距 */
                align-items: flex-start; /* 顶部对齐子项 */
                position: static; /* 静态定位 */
            }

            header#mainHeader .logo {
                margin-bottom: 10px; /* 底部外边距 */
                margin-left: 0; /* 左外边距为0 */
            }

            header#mainHeader nav {
                width: 100%; /* 宽度100% */
                margin-left: 0; /* 左外边距为0 */
                margin-right: 0; /* 右外边距为0 */
                flex-wrap: wrap; /* 允许换行 */
                justify-content: center; /* 子项居中对齐 */
            }

            header#mainHeader nav > a {
                margin: 5px 10px; /* 外边距 */
                height: auto; /* 高度自适应 */
                text-align: center; /* 文本居中 */
                flex-grow: 1; /* 填充可用空间 */
                font-size: 14px; /* 字体大小 */
                padding: 10px 5px; /* 内边距 */
            }

            .dropdown-container {
                position: static; /* 静态定位 */
                width: 100%; /* 宽度100% */
                box-shadow: none; /* 无阴影 */
                border-radius: 0; /* 无圆角 */
                padding: 10px 0; /* 内边距 */
                display: none; /* 默认隐藏 */
                opacity: 1; /* 透明度为1 */
                visibility: visible; /* 可见 */
                transform: none; /* 无变换 */
                background: rgba(192, 192, 192, 0.95); /* 背景为半透明灰色 */
            }

            .nav-item.active .dropdown-container {
                display: flex; /* 激活时显示 */
                flex-direction: column; /* 垂直排列子项 */
                align-items: center; /* 垂直居中对齐子项 */
            }

            .dropdown-content {
                flex-direction: column; /* 垂直排列子项 */
                justify-content: center; /* 子项居中对齐 */
                padding: 10px; /* 内边距 */
                gap: 10px; /* 子项间距 */
            }

            .dropdown-btn {
                width: calc(80% - 20px); /* 宽度计算 */
                max-width: 300px; /* 最大宽度 */
                height: 70px; /* 高度 */
                font-size: 14px; /* 字体大小 */
            }

            /* 移除移动端语言菜单的特殊样式 */

            /* 移动端占位内容区域调整 */
            .placeholder-content {
                margin-top: 0; /* 顶部外边距为0 */
                min-height: auto; /* 最小高度自适应 */
            }

            /* 移动端页脚调整 */
            footer#mainFooter {
                padding: 15px 20px; /* 内边距 */
                font-size: 0.8em; /* 字体大小 */
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mainHeader = document.getElementById('mainHeader'); // 获取主页眉元素
            const navItems = document.querySelectorAll('.nav-item'); // 获取所有导航项元素
            const dropdownContainers = document.querySelectorAll('.dropdown-container'); // 获取所有下拉容器元素

            let headerHideTimeout; // 用于控制页眉隐藏的定时器
            let currentActiveDropdown = null; // 存储当前激活的下拉菜单
            let dropdownShowTime = 0; // 记录下拉菜单显示的时间
            const minDisplayDuration = 500; // 下拉菜单最小显示时长（毫秒）

            // 显示下拉菜单
            function showDropdown(dropdownElement) {
                // 如果当前有激活的下拉菜单且不是要显示的下拉菜单，则隐藏它
                if (currentActiveDropdown && currentActiveDropdown !== dropdownElement) {
                    currentActiveDropdown.style.opacity = '0'; // 设置透明度为0
                    currentActiveDropdown.style.visibility = 'hidden'; // 设置为不可见
                    currentActiveDropdown.style.display = 'none'; // 隐藏元素
                }

                const headerHeight = mainHeader.offsetHeight; // 获取页眉高度
                dropdownElement.style.top = `${headerHeight}px`; // 根据页眉高度设置下拉菜单的top值

                dropdownElement.style.display = 'block'; // 显示下拉菜单
                setTimeout(() => {
                    dropdownElement.style.opacity = '1'; // 逐渐显示下拉菜单（透明度变为1）
                    dropdownElement.style.visibility = 'visible'; // 设置为可见
                }, 10); // 短暂延迟，确保display:block先生效，以便过渡效果可见
                currentActiveDropdown = dropdownElement; // 更新当前激活的下拉菜单
                dropdownShowTime = Date.now(); // 记录当前时间
            }

            // 隐藏所有下拉菜单（带有最小显示时长判断）
            function hideAllDropdowns() {
                // 如果鼠标不在页眉和任何下拉菜单上，则移除页眉的nav-active类
                if (!isMouseOverHeaderAndDropdowns()) {
                    mainHeader.classList.remove('nav-active');
                }

                if (currentActiveDropdown) {
                    const timeSinceShow = Date.now() - dropdownShowTime; // 计算下拉菜单显示了多长时间
                    const remainingTime = minDisplayDuration - timeSinceShow; // 计算还需要显示多长时间

                    if (remainingTime > 0) {
                        clearTimeout(headerHideTimeout); // 清除现有定时器
                        // 如果未达到最小显示时长，则延迟隐藏
                        headerHideTimeout = setTimeout(() => {
                            if (!isMouseOverHeaderAndDropdowns()) {
                                hideAllDropdownsInternal(); // 真正执行隐藏操作
                            }
                        }, remainingTime);
                    } else {
                        hideAllDropdownsInternal(); // 直接隐藏
                    }
                }
            }

            // 内部函数，实际执行隐藏所有下拉菜单的操作
            function hideAllDropdownsInternal() {
                if (currentActiveDropdown) {
                    currentActiveDropdown.style.opacity = '0'; // 设置透明度为0
                    currentActiveDropdown.style.visibility = 'hidden'; // 设置为不可见
                    // 延迟隐藏display，以便过渡效果完成
                    setTimeout(() => {
                        if (currentActiveDropdown) { // 再次检查，以防在延迟期间有新的下拉菜单被激活
                            currentActiveDropdown.style.display = 'none'; // 隐藏元素
                            currentActiveDropdown = null; // 清除当前激活的下拉菜单
                        }
                    }, 300); // 与CSS过渡时间保持一致
                }
            }

            // 判断鼠标是否在页眉或任何激活的下拉菜单上
            function isMouseOverHeaderAndDropdowns() {
                if (mainHeader.matches(':hover')) { // 如果鼠标在页眉上
                    return true;
                }
                // 遍历所有下拉菜单，检查鼠标是否在任何可见且透明度为1的下拉菜单上
                for (let i = 0; i < dropdownContainers.length; i++) {
                    const d = dropdownContainers[i];
                    if (d.matches(':hover') && d.style.display === 'block' && d.style.opacity === '1') {
                        return true;
                    }
                }
                return false;
            }

            // 为每个导航项添加事件监听器
            navItems.forEach(item => {
                const dropdown = item.querySelector('.dropdown-container'); // 获取当前导航项下的下拉菜单

                // 鼠标进入导航项时
                item.addEventListener('mouseenter', function() {
                    clearTimeout(headerHideTimeout); // 清除可能存在的页眉隐藏定时器
                    mainHeader.classList.add('nav-active'); // 添加页眉激活类
                    if (dropdown) { // 如果存在下拉菜单
                        showDropdown(dropdown); // 显示下拉菜单
                    } else {
                        hideAllDropdownsInternal(); // 如果没有下拉菜单，则隐藏所有其他下拉菜单
                    }
                });

                // 导航项点击事件（主要用于移动端）
                item.addEventListener('click', function(e) {
                    // 在移动端且链接为'#'时阻止默认跳转
                    if (window.innerWidth <= 768 && e.currentTarget.getAttribute('href') === '#') {
                        e.preventDefault();
                    }

                    if (window.innerWidth <= 768) { // 仅在移动端生效
                        const targetDropdown = this.querySelector('.dropdown-container'); // 获取当前点击导航项的下拉菜单

                        // 隐藏其他导航项的下拉菜单
                        navItems.forEach(navItem => {
                            if (navItem !== this && navItem.classList.contains('active')) {
                                navItem.classList.remove('active');
                            }
                        });

                        if (targetDropdown) {
                            this.classList.toggle('active'); // 切换当前导航项的active类
                            if (this.classList.contains('active')) {
                                mainHeader.classList.add('nav-active'); // 如果激活，添加页眉激活类
                            } else {
                                // 如果没有其他激活的导航项，则移除页眉激活类
                                setTimeout(() => {
                                    if (!document.querySelector('.nav-item.active')) {
                                        mainHeader.classList.remove('nav-active');
                                    }
                                }, 300);
                            }
                        }
                    }
                });
            });

            // 鼠标离开页眉时
            mainHeader.addEventListener('mouseleave', function() {
                // 设置定时器，延迟隐藏页眉和下拉菜单
                headerHideTimeout = setTimeout(() => {
                    if (!isMouseOverHeaderAndDropdowns()) { // 再次检查鼠标是否在区域内
                        hideAllDropdowns(); // 隐藏所有下拉菜单
                    }
                }, 100); // 短暂延迟
            });

            // 为每个下拉菜单容器添加事件监听器
            dropdownContainers.forEach(dropdown => {
                // 鼠标离开下拉菜单时
                dropdown.addEventListener('mouseleave', function() {
                    // 设置定时器，延迟隐藏页眉和下拉菜单
                    headerHideTimeout = setTimeout(() => {
                        if (!isMouseOverHeaderAndDropdowns()) { // 再次检查鼠标是否在区域内
                            hideAllDropdowns(); // 隐藏所有下拉菜单
                        }
                    }, 100); // 短暂延迟
                });
                // 鼠标进入下拉菜单时
                dropdown.addEventListener('mouseenter', function() {
                    clearTimeout(headerHideTimeout); // 清除可能存在的页眉隐藏定时器
                });
            });

            // 鼠标进入页眉时
            mainHeader.addEventListener('mouseenter', function() {
                clearTimeout(headerHideTimeout); // 清除可能存在的页眉隐藏定时器
                mainHeader.classList.add('nav-active'); // 添加页眉激活类
            });

            // 调整内容区域的顶部外边距，以适应页眉高度
            const adjustContentMargin = () => {
                const headerHeight = mainHeader.offsetHeight; // 获取页眉高度
                const placeholderContent = document.querySelector('.placeholder-content'); // 获取占位内容元素
                if (placeholderContent && window.innerWidth > 768) { // 在非移动端
                    placeholderContent.style.marginTop = `${headerHeight}px`; // 设置顶部外边距
                } else if (placeholderContent && window.innerWidth <= 768) { // 在移动端
                    placeholderContent.style.marginTop = '0'; // 顶部外边距为0
                }
            };
            adjustContentMargin(); // 页面加载时执行一次
            window.addEventListener('resize', adjustContentMargin); // 窗口大小改变时重新调整
        });
    </script>
</body>
</html>

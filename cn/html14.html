<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XINOVA - 页眉和页脚</title>
    <link rel="stylesheet" href="hf.css">
    <style>
        /* 这部分样式是此页面特有的内容样式 */

        /* 占位内容区域，用于保持页脚在底部，并模拟原页面的头部间距 */
        .placeholder-content {
            min-height: calc(100vh - 90px); /* 减去头部高度 */
            /* margin-top 将由 JS 动态设置 */
            flex-grow: 1; /* 填充可用空间 */
            background-color: #f4f4f4; /* 保持与原页面背景色一致 */
            padding: 20px; /* 添加内边距 */
            display: flex; /* 让内部块可以垂直堆叠，并居中 */
            flex-direction: column;
            align-items: center; /* 水平居中内容块 */
        }

        /* 第一个新块样式 */
        .content-block-1 {
            display: flex;
            align-items: center;
            height: 600px;
            background-color: #fff; /* 设置块的背景为白色 */
            margin-bottom: 0px; /* 与下一个块的间距 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            width: 100%; /* 默认100%宽度，但会被max-width限制 */
            max-width: 1088px; /* 设置最大宽度，实现左右留白 */
            padding: 0; /* 内部不需要padding，由左右section控制 */
        }

        .content-block-1 .image-section {
            flex: 1; /* 占据左侧空间 */
            height: 100%;
            background-color: #fff; /* 设置图片区域的背景为白色，以避免灰色背景出现 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px; /* 让图片有内部留白 */
        }

        .content-block-1 .image-section img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 让图片完整显示在区域内，而不是裁剪 */
        }

        .content-block-1 .text-section {
            flex: 1; /* 占据右侧空间 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-block-1 .text-section h3 {
            font-family: 'STKaiti', 'KaiTi', sans-serif; /* 楷体字体 */
            font-weight: bold; /* 加粗 */
            font-size: 32px; /* 标题大小，可调整 */
            margin-bottom: 20px; /* 与下方段落的间距 */
            color: #333;
            text-align: center; /* 标题居中 */
        }

        .content-block-1 .text-section p {
            font-family: 'STKaiti', 'KaiTi', sans-serif; /* 楷体字体 */
            margin-bottom: 10px;
            font-size: 24px;
            line-height: 1.5;
            color: #333;
        }

        .content-block-1 .emoji-links {
            display: flex;
            gap: 15px; /* 颜文字之间的间距 */
            flex-wrap: wrap;
            justify-content: right; /* 颜文字居中 */
            margin-top: 20px; /* 与上方文本的间距 */
        }

        .content-block-1 .emoji-links a {
            text-decoration: none;
            font-size: 24px; /* 颜文字大小 */
            transition: transform 0.2s ease-in-out;
            display: inline-block; /* 允许transform生效 */
        }

        .content-block-1 .emoji-links a:hover {
            transform: scale(1.2); /* 鼠标悬停放大效果 */
        }

        /* 第二个新块样式 */
        .content-block-2 {
            background-color: #fff;
            padding: 20px;
            height: 500px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
            text-align: center;
            width: 100%; /* 默认100%宽度，但会被max-width限制 */
            max-width: 1088px; /* 设置最大宽度，实现左右留白 */
            margin-bottom: 0px; /* 与页脚的间距 */
        }

        .content-block-2 .image-container {
            max-width: 800px; /* 图片最大宽度 */
            height: 300px;
            margin: 0 auto 15px auto; /* 图片居中并下方留白 */
            overflow: hidden;
            border-radius: 4px;
        }

        .content-block-2 .image-container img {
            width: 800px;
            height: 250px;
            display: block; /* 移除图片底部空白 */
        }

        .content-block-2 .qiyeyuanjing {
            font-family: 'STKaiti', 'KaiTi', sans-serif;
            font-weight: bold; /* 加粗 */
            font-size: 32px; /* 标题大小，可调整 */
            margin-bottom: 20px; /* 与下方段落的间距 */
            color: #333;
            text-align: left; /* 标题居中 */
            line-height: 1.4;
        }

        .content-block-2 .image-description {
            font-size: 36px;
            color: #666;
            line-height: 1.4;
        }

        /* 移动端响应式调整 */
        @media (max-width: 768px) {
            /* 移动端占位内容区域调整 */
            .placeholder-content {
                margin-top: 0;
                min-height: auto;
                padding: 15px; /* 移动端调整内边距 */
                align-items: stretch; /* 恢复默认对齐，让内容块占据可用宽度 */
            }

            /* 移动端第一个新块样式调整 */
            .content-block-1 {
                flex-direction: column; /* 堆叠图片和文本 */
                height: auto; /* 高度自适应 */
                padding: 15px; /* 内部增加padding */
                max-width: 100%; /* 移动端取消最大宽度限制 */
            }

            .content-block-1 .image-section {
                width: 100%; /* 图片全宽 */
                height: 150px; /* 固定图片高度 */
                margin-bottom: 15px; /* 图片下方留白 */
                padding: 0; /* 移动端图片部分内部不需要padding，由父级控制 */
            }

            .content-block-1 .image-section img {
                object-fit: cover; /* 移动端图片依然覆盖 */
            }

            .content-block-1 .text-section {
                width: 100%; /* 文本全宽 */
                padding: 0; /* 移除内部padding，由父级padding控制 */
            }

            .content-block-1 .text-section h3 { /* 移动端标题样式调整 */
                font-size: 20px;
                margin-bottom: 15px;
            }

            .content-block-1 .emoji-links {
                justify-content: center; /* 颜文字居中 */
            }

            /* 移动端第二个新块样式调整 */
            .content-block-2 {
                max-width: 100%; /* 移动端取消最大宽度限制 */
            }
        }
    </style>
</head>
<body>

    <div id="headerPlaceholder"></div>

    <div class="placeholder-content">
        <div class="content-block-1">
            <div class="image-section">
                <img src="assets/images/taejoo.jpg" alt="示例图片">
            </div>
            <div class="text-section">
                <h3>经营理念</h3>
                <p style="text-indent: 2em;">自创立以来，鑫华夏集团始终站在工业前沿，成长为一家值得信赖的EPC综合服务企业。</p>
                <p style="text-indent: 2em;">我们不忘初心，始终以技术为基础，在众多项目中不断挑战自我，稳步前行。</p>
                <p style="text-indent: 2em;">通过持续改进、继往开来，我们不断增强全球竞争力，正在成为客户可信赖、社会尊敬的EPC引领者。</p>
                <p style="text-indent: 2em;">我们将继续以诚信立业，以责任铸魂，为客户、员工与社会创造更大价值。</p>
                <p style="text-indent: 2em;">衷心感谢您的关注与支持!</p>


                            <div class="image-container">
                <img src="assets/images/sign.jpg">
            </div>
                
                

                <div class="emoji-links">
                    <a href="https://m.cyberseodang.or.kr/verbalTrans/classic_view.asp?idx=860&listLevel=3" target="_blank"> </a>
                </div>
            </div>
        </div>

        <div class="content-block-2">
            <p class="qiyeyuanjing">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;企业愿景 <p>

            <div class="image-container">
                <img src="assets/images/culture2.jpg">
            </div>

            <p class="image-description">传承初心，锐意进取，迈向国际EPC领导者！ <p>
        </div>
    </div>

    <div id="footerPlaceholder"></div>

    <script src="hf.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 根据页眉高度调整内容边距
            const adjustContentMargin = () => {
                const mainHeader = document.getElementById('mainHeader');
                const placeholderContent = document.querySelector('.placeholder-content');
                if (mainHeader && placeholderContent && window.innerWidth > 768) {
                    const headerHeight = mainHeader.offsetHeight;
                    placeholderContent.style.marginTop = `${headerHeight}px`;
                } else if (placeholderContent && window.innerWidth <= 768) {
                    placeholderContent.style.marginTop = '0';
                }
            };

            // 延迟调用 adjustContentMargin，确保 hf.js 中的 DOMContentLoaded 逻辑已执行
            setTimeout(adjustContentMargin, 50); // 短暂延迟，给浏览器渲染时间
            window.addEventListener('resize', adjustContentMargin);
        });
    </script>

</body>
</html>
